# ============================================
# SPRING APPLICATION CONFIGURATION
# ============================================
spring.application.name=authcore
server.port=8080

# CORS Configuration
FRONTEND_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000

# ============================================
# SUPABASE POSTGRESQL DATABASE CONFIGURATION
# ============================================

# Database URL must be set via SPRING_DATASOURCE_URL environment variable
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Connection Pool Settings (HikariCP) - Optimized for Transaction Poolers (Render/Supabase)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

# JDBC URL parameters for transaction pooler compatibility (Render/Supabase)
spring.datasource.properties.preparedStatementCacheQueries=0
spring.datasource.properties.preparedStatementCacheSize=0

# Disable Hibernate metadata validation for transaction pooler compatibility
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ============================================
# FLYWAY DATABASE MIGRATIONS
# ============================================
# Disabled for transaction pooler compatibility (Render/Supabase)
spring.flyway.enabled=false

# ============================================
# JPA / HIBERNATE CONFIGURATION
# ============================================
# Using create-drop to avoid metadata validation issues with transaction poolers
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=true
spring.jpa.properties.hibernate.hbm2ddl.auto=create-drop

# ============================================
# LOGGING
# ============================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.springframework.security=DEBUG
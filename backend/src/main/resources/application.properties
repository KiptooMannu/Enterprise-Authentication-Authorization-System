# ============================================
# SPRING APPLICATION CONFIGURATION
# ============================================
spring.application.name=authcore
server.port=8080

# ============================================
# SUPABASE POSTGRESQL DATABASE CONFIGURATION
# ============================================

# RECOMMENDED: Use Transaction Pooler (port 6543) for application connections
# This provides connection pooling and better performance
# Note: preferQueryMode=simple and prepareThreshold=0 are required for Supabase poolers
spring.datasource.url=jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:6543/postgres?user=postgres.pcmoavpzsfzqyxtoddde&password=Mannu005%21Mannu005&sslmode=require&preferQueryMode=simple&prepareThreshold=0
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ============================================
# JPA / HIBERNATE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=true

# ============================================
# LOGGING
# ============================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.springframework.security=DEBUG
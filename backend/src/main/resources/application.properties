# ============================================
# SPRING APPLICATION CONFIGURATION
# ============================================
spring.application.name=authcore
server.port=8080

# CORS Configuration
FRONTEND_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000

# ============================================
# SUPABASE POSTGRESQL DATABASE CONFIGURATION
# ============================================

# Use Transaction Pooler (port 6543) - requires simple query mode
spring.datasource.url=jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:6543/postgres?user=postgres.pcmoavpzsfzqyxtoddde&password=Mannu005%21Mannu005&sslmode=require&preferQueryMode=simple&prepareThreshold=0
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings (HikariCP) - Optimized for Supabase Transaction Pooler
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

# ============================================
# JPA / HIBERNATE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=true

# ============================================
# LOGGING
# ============================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.springframework.security=DEBUG